# ============================================================
# Prometheus Configuration — DevOps 101 Project
# ============================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus monitors itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape our Flask app /metrics endpoint
  - job_name: 'devops101-app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['app:5000']
        labels:
          instance: 'devops101-app'
