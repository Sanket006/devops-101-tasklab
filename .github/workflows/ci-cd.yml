# ============================================================
# GitHub Actions CI/CD Pipeline — DevOps 101 Project
#
# STAGES:
#  1. lint       → Check code style with flake8
#  2. test       → Run pytest with coverage
#  3. build      → Build Docker image
#  4. push       → Push to DockerHub (on main branch only)
#  5. deploy     → Update k8s manifest with new image tag
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devops101-app

jobs:

  # ──────────────────────────────────────────────────────────
  # JOB 1: Lint — Code Quality Check
  # ──────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dev dependencies
        run: pip install -r app/requirements-dev.txt

      - name: Run flake8 (max line length 100)
        run: |
          flake8 app/app.py \
            --max-line-length=100 \
            --ignore=E501,W503 \
            --statistics

  # ──────────────────────────────────────────────────────────
  # JOB 2: Test — Run Unit Tests
  # ──────────────────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: lint                    # Only run tests if lint passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r app/requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ──────────────────────────────────────────────────────────
  # JOB 3: Build — Docker Image
  # ──────────────────────────────────────────────────────────
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test                    # Only build if tests pass

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      short_sha: ${{ steps.sha.outputs.short }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Build Docker image (no push yet)
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────
  # JOB 4: Push — Publish to DockerHub (main branch only)
  # ──────────────────────────────────────────────────────────
  push:
    name: 📦 Push to DockerHub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image_tag: sha-${{ needs.build.outputs.short_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────
  # JOB 5: Deploy — Update K8s Manifest (GitOps-style)
  # ──────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Update Deployment Manifest
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_TOKEN }}

      - name: Update and push manifest
        run: |
          # Update the image tag in the deployment YAML
          sed -i "s|image: ${{ env.IMAGE_NAME }}:.*|image: ${{ env.IMAGE_NAME }}:${{ needs.push.outputs.image_tag }}|g" k8s/deployment.yaml
          
          # Configure Git credentials
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Commit and push changes if any exist
          git diff --quiet k8s/deployment.yaml || (git commit -am "chore: update image tag to ${{ needs.push.outputs.image_tag }} [skip ci]" && git push)
