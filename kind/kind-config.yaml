# =============================================================
# Kind Cluster Configuration — DevOps 101 Project
# Create cluster with: kind create cluster --config kind/kind-config.yaml --name devops101
# =============================================================

apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
nodes:
  - role: control-plane
    extraPortMappings:
      # Map NodePort 30080 (our Flask app NodePort) from the node to the host
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
