# ============================================================
# Custom Values for kube-prometheus-stack Helm Chart
# DevOps 101 Project
# ============================================================

# Grafana configuration overrides
grafana:
  # Enable admin login with a default password
  adminPassword: "devops101"
  
  # Configure the dashboard sidecar to auto-discover and load dashboards from configmaps
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL

# Prometheus configuration overrides
prometheus:
  prometheusSpec:
    # Ensure Prometheus scrapes all ServiceMonitors in the cluster
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
