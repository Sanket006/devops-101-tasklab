# =============================================================
# Kubernetes Manifests — DevOps 101 Project
# Apply with: kubectl apply -f k8s/
# =============================================================

---
# ─── Namespace ────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: devops101
  labels:
    project: devops101
    managed-by: kubectl

---
# ─── ConfigMap (App Configuration) ────────────────────────────
# This is how we pass config to our app in Kubernetes.
# Think of it as a shared settings file for the container.
apiVersion: v1
kind: ConfigMap
metadata:
  name: devops101-config
  namespace: devops101
data:
  APP_VERSION: "1.0.0"
  ENV_NAME: "kubernetes"
  FLASK_DEBUG: "false"
  PORT: "5000"

---
# ─── Deployment (Runs the App Pods) ───────────────────────────
# A Deployment ensures your app always has the right number
# of replicas running. If a pod crashes, Kubernetes restarts it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops101-app
  namespace: devops101
  labels:
    app: devops101
    component: backend
spec:
  replicas: 2                      # Run 2 copies for availability

  selector:
    matchLabels:
      app: devops101

  strategy:
    type: RollingUpdate             # Zero-downtime deployments
    rollingUpdate:
      maxSurge: 1                   # Allow 1 extra pod during update
      maxUnavailable: 0             # Never take a pod down before new one is up

  template:
    metadata:
      labels:
        app: devops101
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "5000"
    spec:
      containers:
        - name: app
          # ↓ This tag is updated automatically by the CI/CD pipeline
          image: sanket006/devops101-app:sha-894841d
          imagePullPolicy: Always

          ports:
            - containerPort: 5000
              name: http

          # Load config from ConfigMap
          envFrom:
            - configMapRef:
                name: devops101-config

          # Liveness: If this fails, Kubernetes restarts the container
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3

          # Readiness: If this fails, traffic is NOT sent to this pod
          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10

          # Resource limits: prevent one pod from eating all CPU/memory
          resources:
            requests:
              cpu: "100m"           # 0.1 CPU core
              memory: "128Mi"       # 128 MB RAM
            limits:
              cpu: "300m"           # Max 0.3 CPU core
              memory: "256Mi"       # Max 256 MB RAM

      # Security: don't run as root
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000

---
# ─── Service (Network Access to Pods) ─────────────────────────
# A Service gives a stable IP/DNS name to a group of pods.
# Without this, you'd need to track individual pod IPs (they change!).
apiVersion: v1
kind: Service
metadata:
  name: devops101-service
  namespace: devops101
  labels:
    app: devops101
spec:
  selector:
    app: devops101               # Route to pods with this label
  ports:
    - protocol: TCP
      port: 80                   # Service listens on port 80
      targetPort: 5000           # Forwards to container port 5000
  type: ClusterIP                # Internal access only (use Ingress/NodePort for external)

---
# ─── NodePort Service (Quick Local Access) ─────────────────────
# Use this to access the app from your browser when testing locally
# with minikube or kind (no Ingress controller needed).
apiVersion: v1
kind: Service
metadata:
  name: devops101-nodeport
  namespace: devops101
  labels:
    app: devops101
spec:
  selector:
    app: devops101
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
      nodePort: 30080            # Access via http://localhost:30080
  type: NodePort

---
# ─── HorizontalPodAutoscaler (Auto Scaling) ────────────────────
# Automatically add more pods when CPU usage is high.
# Requires: kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devops101-hpa
  namespace: devops101
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devops101-app
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70    # Scale up if CPU > 70%
