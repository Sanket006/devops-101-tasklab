# =============================================================
# Argo CD GitOps Application Manifest — DevOps 101 Project
# Apply with: kubectl apply -f k8s/argocd-app.yaml
# =============================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops101-app
  namespace: argocd
  labels:
    project: devops101
spec:
  project: default
  
  source:
    repoURL: 'https://github.com/Sanket006/devops-101-tasklab.git'
    targetRevision: main
    path: k8s
    
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: devops101

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
