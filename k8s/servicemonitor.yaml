# =============================================================
# ServiceMonitor Manifest — DevOps 101 Project
# Target for Prometheus Operator automatic scrape discovery
# =============================================================

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: devops101-app-monitor
  namespace: devops101
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: devops101
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
